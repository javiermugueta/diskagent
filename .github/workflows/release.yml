name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install RPM tooling
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build release artifacts
        run: ./scripts/release_artifacts.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/linuxfsagent-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/linuxfsagent-${{ github.ref_name }}-linux-arm64.tar.gz
            dist/linuxfsagent-${{ github.ref_name }}-darwin-amd64.tar.gz
            dist/linuxfsagent-${{ github.ref_name }}-darwin-arm64.tar.gz
            dist/linuxfsagent-${{ github.ref_name }}-1.x86_64.rpm
            dist/checksums.txt
            install.sh
